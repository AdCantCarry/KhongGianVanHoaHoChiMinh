<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đọc sách - Không Gian Văn Hóa Hồ Chí Minh</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .reader-content { 
            max-width: 1000px; 
            margin: 40px auto; 
            background: rgba(255,255,255,0.9); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        /* Style cho iframe để nhìn chuyên nghiệp */
        .pdf-frame { 
            width: 100%; 
            height: 80vh; 
            border: none; 
            border-radius: 15px; 
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <img src="images/TTCU.jpg" alt="Logo" class="logo-img">
                <h1 class="brand-title">KHÔNG GIAN VĂN HÓA HỒ CHÍ MINH</h1>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li class="nav-item"><a href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a href="cuoc-doi.html">Cuộc đời sự nghiệp</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="reader-content">
            <a href="index.html#sach" style="display:block; margin-bottom:15px; font-weight:bold; color:var(--primary-red);">← Quay lại</a>
            
            <!-- Khung hiển thị sách -->
            <iframe id="pdf-viewer" class="pdf-frame" src="" allowfullscreen="true" allow="clipboard-write"></iframe>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Bản quyền thuộc về Dự án Không Gian Văn Hóa Hồ Chí Minh.</p>
        </div>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('file'); // Tên file PDF cục bộ (nếu có)
        const embedLink = params.get('embed'); // Link Heyzine (nếu có)
        const viewer = document.getElementById('pdf-viewer');

        if(embedLink) {
            // Nếu có link embed Heyzine, ưu tiên dùng cái này [cite: 1]
            viewer.src = embedLink;
        } else if(fileName) {
            // Nếu không, dùng file PDF trong thư mục documents
            viewer.src = "documents/" + fileName;
        }
    </script>
</body>
</html>
